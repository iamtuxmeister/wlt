upstream wlt {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen      80;
    server_name yourdomain.com www.yourdomain.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen      443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN                            always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    access_log /var/log/nginx/wlt.access.log;
    error_log  /var/log/nginx/wlt.error.log warn;

    location /static/ {
        alias   /path/to/wlt/priv/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Accept-Ranges bytes;
        gzip on; gzip_types text/css application/javascript; gzip_min_length 256;
    }

    location /static/audio/ {
        alias        /path/to/wlt/priv/static/audio/;
        add_header   Accept-Ranges bytes;
        sendfile     on;
        tcp_nopush   on;
        tcp_nodelay  on;
    }

    location / {
        proxy_pass            http://wlt;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
        proxy_connect_timeout 5s;
        proxy_buffer_size     16k;
        proxy_buffers         4 32k;
        proxy_busy_buffers_size 64k;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html { root /var/www/html; internal; }
}
