    <!-- Contact Section -->
    <section id="contact" class="contact-section">
        <div class="container">
            <div class="row">
                <div class="col-lg-12" align="left">
                    <h1>Contact Us</h1>
                    <br>
                </div>
            </div>
            {% if contact_status == "sent" %}
            <div class="row">
                <div class="col-md-offset-2 col-md-6" align="left">
                    <div class="alert alert-success">Thanks for reaching out — your message has been sent.</div>
                </div>
            </div>
            {% endif %}
            {% if contact_status == "error" %}
            <div class="row">
                <div class="col-md-offset-2 col-md-6" align="left">
                    <div class="alert alert-danger">Sorry, something went wrong sending your message. Please try again.</div>
                </div>
            </div>
            {% endif %}
            <div class="row">
                <form id="contact-form" class="form-horizontal" action="/contact" method="post">
                  <div class="form-group">

                	<label class="col-md-2 form-styler" for="id_first_name">First Name:</label>
                    <div class="col-md-6">
                	<input class="form-control" id="id_first_name" name="first_name" placeholder="Jane" type="text"/>
                    </div>
                  </div>
                  <div class="form-group">

                	<label class="col-md-2 form-styler" for="id_last_name">Last Name:</label>
                    <div class="col-md-6">
                	<input class="form-control" id="id_last_name" name="last_name" placeholder="Doe" type="text"/>
                    </div>
                  </div>
                  <div class="form-group">

                	<label class="col-md-2 form-styler" for="id_from_email">Email Address:</label>
                    <div class="col-md-6">
                	<input class="form-control" id="id_from_email" name="from_email" placeholder="jane.doe@example.com" type="email"/>
                    </div>
                  </div>
                  <div class="form-group">

                	<label class="col-md-2 form-styler" for="id_message">Comments:</label>
                    <div class="col-md-6">
                	<textarea class="form-control" cols="40" id="id_message" name="message" placeholder="Please give us feedback." rows="10">
</textarea>
                    </div>
                  </div>
                  <input type="hidden" name="recaptcha_token" id="recaptcha_token"/>
                  <div class="form-group">
                      <div class="col-md-offset-2 col-md-6" align="left">
                      <button type="submit" class="btn btn-default">Submit</button>
                      </div>
                  </div>
                </form>
            </div>
        </div>
    </section>

    <script src="https://www.google.com/recaptcha/api.js?render={{ recaptcha_key }}"></script>
    <script>
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var form = this;
            if (form.dataset.submitting) return;
            form.dataset.submitting = "1";
            var submitBtn = form.querySelector('button[type="submit"]');
            if (submitBtn) submitBtn.disabled = true;
            grecaptcha.ready(function() {
                grecaptcha.execute('{{ recaptcha_key }}', {action: 'contact'}).then(function(token) {
                    document.getElementById('recaptcha_token').value = token;
                    form.submit();
                });
            });
        });
    </script>
